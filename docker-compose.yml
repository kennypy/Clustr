services:
  clustr:
    build: .
    container_name: clustr
    restart: unless-stopped
    # Published to the host loopback only. The container binds 0.0.0.0 INSIDE
    # the container (see Dockerfile), but it is exposed to 127.0.0.1 on the host
    # so it is not reachable from the LAN. Put a reverse proxy / Cloudflare
    # Tunnel in front (pointing at 127.0.0.1:8080) for remote access, and enable
    # auth before exposing it publicly.
    # MCP_PORT is interpolated from .env (default 8080) so the published port,
    # the in-container listener, and the health check stay in sync.
    ports:
      - "127.0.0.1:${MCP_PORT:-8080}:${MCP_PORT:-8080}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, urllib.request; urllib.request.urlopen('http://localhost:%s/health' % os.environ.get('MCP_PORT', '8080'))"]
      interval: 30s
      timeout: 5s
      retries: 3
