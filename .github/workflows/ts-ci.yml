name: TypeScript CI

on:
  push:
    branches: [main]
    paths: ["clustr-ts/**"]
  pull_request:
    branches: [main]
    paths: ["clustr-ts/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clustr-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clustr-ts/package-lock.json
      - name: Install (from lockfile)
        run: npm ci
      - name: Build (tsc)
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Validate MCPB manifest
        run: npx @anthropic-ai/mcpb validate manifest.json
